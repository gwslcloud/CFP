<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFP PCRR 2026</title>
    
    <!-- Configurações de PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="brasao.png">

    <!-- Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@100;300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-soft: rgba(212, 175, 55, 0.6);
            --bg-deep: #020617;
            --navy-glow: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.01);
            --glass-border: rgba(212, 175, 55, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-deep);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Evita scroll indesejado com as luzes */
        }

        /* 1. MESH GRADIENT (LUZES ATMOSFÉRICAS) */
        .ambient-light {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 100%, #0a1120 0%, var(--bg-deep) 100%);
        }

        .light-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--gold); top: -10%; left: -10%; }
        .orb-2 { width: 300px; height: 300px; background: #1e3a8a; bottom: -5%; right: -5%; animation-delay: -5s;}

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
            z-index: 10;
        }

        /* 2. MICRO-INTERAÇÕES (ANIMAÇÕES DE ENTRADA) */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .brasao {
            width: 130px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.15));
            animation-delay: 0.2s;
        }

        /* 3. TIPOGRAFIA REFINADA */
        .faltam-label {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 12px; /* Kerning extremo profissional */
            text-transform: uppercase;
            color: var(--gold-soft);
            margin-bottom: 1.5rem;
            font-weight: 400;
            animation-delay: 0.4s;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            margin-bottom: 2.5rem;
            animation-delay: 0.6s;
        }

        /* 4. GLASSMORPHISM 2.0 */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.8rem 0.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Brilho na quina do card */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }

        .number {
            display: block;
            font-size: 3rem;
            font-weight: 900; /* Peso extremo para contraste */
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 5px;
        }

        .unit {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            font-weight: 600;
            opacity: 0.7;
        }

        .target-phrase {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 3.5rem;
            font-weight: 400;
            animation-delay: 0.8s;
        }

        .progress-container {
            width: 100%;
            animation-delay: 1s;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: var(--gold-soft);
        }

        .track {
            height: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: var(--gold);
            box-shadow: 0 0 20px var(--gold-soft);
            transition: width 1.5s ease-in-out;
        }

        #install-btn {
            display: none;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--gold);
            padding: 12px 24px;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin: 2rem auto;
            transition: 0.3s;
        }

        .footer-brand {
            margin-top: 3rem;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            animation-delay: 1.2s;
        }

        @media (min-width: 768px) {
            .app-container { max-width: 800px; }
            .countdown-grid { grid-template-columns: repeat(4, 1fr); }
            .number { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-light">
        <div class="light-orb orb-1"></div>
        <div class="light-orb orb-2"></div>
    </div>

    <div class="app-container">
        <header class="brasao-wrapper reveal">
            <img src="brasao.png" alt="PCRR" class="brasao" onerror="this.src='https://i.imgur.com/8Qp2D6C.png'">
        </header>

        <span class="faltam-label reveal">Faltam</span>

        <main class="countdown-grid reveal">
            <div class="card">
                <span class="number" id="days">00</span>
                <span class="unit">Dias</span>
            </div>
            <div class="card">
                <span class="number" id="hours">00</span>
                <span class="unit">Hrs</span>
            </div>
            <div class="card">
                <span class="number" id="minutes">00</span>
                <span class="unit">Min</span>
            </div>
            <div class="card">
                <span class="number" id="seconds">00</span>
                <span class="unit">Seg</span>
            </div>
        </main>

        <h2 class="target-phrase reveal">Para o início da Aula Inaugural</h2>

        <div class="progress-container reveal">
            <div class="progress-label">
                <span>Jornada de Formação</span>
                <span id="pct">0.00%</span>
            </div>
            <div class="track">
                <div class="bar" id="bar"></div>
            </div>
        </div>

        <button id="install-btn">Instalar Aplicativo</button>

        <footer class="footer-brand reveal">
            Comissão Oficial do Cadastro Reserva Da PCRR
        </footer>
    </div>

    <script>
        const target = new Date('2026-09-04T00:00:00').getTime();
        const start = new Date('2024-01-01T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.title = "O CFP COMEÇOU!";
                document.body.innerHTML = `<div class='app-container'><h1 style='color:var(--gold); font-family:Cinzel;'>O CFP PCRR COMEÇOU!</h1></div>`;
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.title = `Faltam ${d} dias | PCRR`;
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            const total = target - start;
            const current = now - start;
            let percent = (current / total) * 100;
            percent = Math.min(Math.max(percent, 0), 100);

            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('pct').innerText = percent.toFixed(2) + '%';
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
