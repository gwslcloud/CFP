<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFP PCRR 2026</title>
    <!-- Fontes: Cinzel para títulos institucionais e Montserrat para dados -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-gradient: linear-gradient(180deg, #F3DFA2 0%, #D4AF37 100%);
            --navy-deep: #05070a;
            --navy-light: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(212, 175, 55, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--navy-deep);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, var(--navy-light) 0%, var(--navy-deep) 80%);
        }

        /* Container Principal ajustado para Mobile */
        .app-container {
            width: 100%;
            max-width: 500px; /* Largura ideal para Mobile */
            padding: 2rem 1.5rem;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        /* Brasão Superior */
        .brasao-wrapper {
            margin-bottom: 1.5rem;
        }

        .brasao {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2));
        }

        /* Palavra FALTAM remodelada */
        .faltam-label {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.5rem;
            font-weight: 400;
            display: block;
        }

        /* Grid do Cronômetro - 2x2 no Celular para melhor aproveitamento */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-gold);
            border-radius: 16px;
            padding: 1.5rem 0.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .number {
            display: block;
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }

        .unit {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
        }

        /* Frase Inferior */
        .target-phrase {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 3rem;
            padding: 0 10px;
        }

        /* Barra de Progresso Mobile */
        .progress-container {
            width: 100%;
            padding: 0 10px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 600;
        }

        .track {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1A365D, var(--gold));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Rodapé Discreto */
        .footer-brand {
            margin-top: 3rem;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajustes para Telas maiores (Desktop) */
        @media (min-width: 768px) {
            .app-container { max-width: 800px; }
            .countdown-grid { grid-template-columns: repeat(4, 1fr); }
            .faltam-label { font-size: 1.5rem; }
            .number { font-size: 4rem; }
            .brasao { width: 180px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="brasao-wrapper">
            <img src="brasao.png" alt="Brasão PCRR" class="brasao" onerror="this.src='https://i.imgur.com/8Qp2D6C.png'">
        </header>

        <span class="faltam-label">Faltam</span>

        <main class="countdown-grid">
            <div class="card">
                <span class="number" id="days">00</span>
                <span class="unit">Dias</span>
            </div>
            <div class="card">
                <span class="number" id="hours">00</span>
                <span class="unit">Horas</span>
            </div>
            <div class="card">
                <span class="number" id="minutes">00</span>
                <span class="unit">Minutos</span>
            </div>
            <div class="card">
                <span class="number" id="seconds">00</span>
                <span class="unit">Segundos</span>
            </div>
        </main>

        <h2 class="target-phrase">Para o início da Aula Inaugural</h2>

        <div class="progress-container">
            <div class="progress-label">
                <span>Progresso até o Curso</span>
                <span id="pct">0.00%</span>
            </div>
            <div class="track">
                <div class="bar" id="bar"></div>
            </div>
        </div>

        <div class="footer-brand">Polícia Civil de Roraima</div>
    </div>

    <script>
        // Data alvo: 04 de Setembro de 2026 às 00:00
        const target = new Date('2026-09-04T00:00:00').getTime();
        // Data base para progresso (Início de 2024)
        const start = new Date('2024-01-01T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.title = "O CFP COMEÇOU!";
                document.body.innerHTML = `
                    <div class='app-container'>
                        <img src='brasao.png' class='brasao' style='width:150px; margin-bottom:2rem;'>
                        <h1 style='font-family:Cinzel; color:var(--gold);'>O CFP PCRR COMEÇOU!</h1>
                        <p style='margin-top:1rem; font-size:0.8rem; letter-spacing:2px;'>VALOR E LEALDADE</p>
                    </div>`;
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // Atualiza aba do navegador
            document.title = `Faltam ${d} dias | PCRR`;

            // Atualiza interface
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            // Progresso
            const total = target - start;
            const current = now - start;
            let percent = (current / total) * 100;
            percent = Math.min(Math.max(percent, 0), 100);

            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('pct').innerText = percent.toFixed(2) + '%';
        }

        // Atualiza a cada segundo
        setInterval(updateCountdown, 1000);
        // Execução imediata
        updateCountdown();
    </script>
</body>
</html>
