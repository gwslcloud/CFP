<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFP PCRR 2026</title>
    
    <!-- Configurações de PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="brasao.png">

    <!-- Fontes Táticas e Institucionais -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #F3DFA2;
            --gold-muted: rgba(212, 175, 55, 0.4);
            --navy-black: #05070a;
            --tactical-blue: #0a1120;
            --text-gray: #cbd5e1;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--navy-black);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 1. FUNDO TÁTICO: SPOTLIGHT + GRID */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Efeito de micro-pontos táticos */
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Holofote radial atrás do brasão */
            background: radial-gradient(circle at 50% 35%, var(--tactical-blue) 0%, var(--navy-black) 70%);
            z-index: 0;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeIn 1.2s ease-out;
        }

        /* 2. BRASÃO RESTRUTURADO */
        .brasao-wrapper {
            margin-bottom: 2rem;
            position: relative;
        }

        .brasao {
            width: 180px; /* Aumentado conforme solicitado */
            height: auto;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.25));
            transition: transform 0.4s ease;
        }

        /* 3. CONTRASTE DE TEXTO E TIPOGRAFIA */
        .faltam-label {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 12px; /* Letter spacing alargado */
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
            font-weight: 700;
            opacity: 0.9;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            margin-bottom: 2.5rem;
        }

        /* 4. CARDS GLASSMORPHISM COM BORDAS DOURADAS */
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--gold-muted); /* Borda fina dourada semi-transparente */
            border-radius: 12px;
            padding: 1.8rem 0.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.1);
        }

        /* Efeito reflexivo no hover */
        .card::before {
            content: "";
            position: absolute;
            top: -100%; left: -100%;
            width: 200%; height: 200%;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .card:hover::before { top: 0; left: 0; }

        .number {
            display: block;
            font-size: 3.2rem;
            font-weight: 900;
            line-height: 1;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .unit {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            font-weight: 700;
        }

        .target-phrase {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            line-height: 1.8;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-gray); /* Cinza claro com alta legibilidade */
            margin-bottom: 3.5rem;
            font-weight: 400;
        }

        /* PROGRESSO TÁTICO */
        .progress-container { width: 100%; margin-bottom: 2.5rem; }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--gold);
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .track {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1e293b, var(--gold));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #install-btn {
            display: none;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 24px;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            cursor: pointer;
            margin: 0 auto 2.5rem;
            transition: 0.3s;
        }

        .footer-brand {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--text-gray);
            opacity: 0.6;
            text-transform: uppercase;
            max-width: 80%;
            margin: 0 auto;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 768px) {
            .app-container { max-width: 850px; }
            .countdown-grid { grid-template-columns: repeat(4, 1fr); }
            .number { font-size: 4.5rem; }
            .brasao { width: 220px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="brasao-wrapper">
            <img src="brasao.png" alt="Brasão PCRR" class="brasao">
        </header>

        <span class="faltam-label">Faltam</span>

        <main class="countdown-grid">
            <div class="card">
                <span class="number" id="days">00</span>
                <span class="unit">Dias</span>
            </div>
            <div class="card">
                <span class="number" id="hours">00</span>
                <span class="unit">Horas</span>
            </div>
            <div class="card">
                <span class="number" id="minutes">00</span>
                <span class="unit">Minutos</span>
            </div>
            <div class="card">
                <span class="number" id="seconds">00</span>
                <span class="unit">Segundos</span>
            </div>
        </main>

        <h2 class="target-phrase">Para o início da Aula Inaugural</h2>

        <div class="progress-container">
            <div class="progress-label">
                <span>Progresso Operacional</span>
                <span id="pct">0.00%</span>
            </div>
            <div class="track">
                <div class="bar" id="bar"></div>
            </div>
        </div>

        <button id="install-btn">Instalar Terminal</button>

        <footer class="footer-brand">
            Comissão Oficial do Cadastro Reserva da PCRR
        </footer>
    </div>

    <script>
        const target = new Date('2026-09-04T00:00:00').getTime();
        const start = new Date('2024-01-01T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.title = "MISSAO INICIADA";
                document.body.innerHTML = `<div class='app-container'><h1 style='color:var(--gold); font-family:Cinzel; font-size:3rem;'>CURSO INICIADO</h1></div>`;
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.title = `Faltam ${d} dias | PCRR`;
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            const total = target - start;
            const current = now - start;
            let percent = (current / total) * 100;
            percent = Math.min(Math.max(percent, 0), 100);

            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('pct').innerText = percent.toFixed(2) + '%';
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
