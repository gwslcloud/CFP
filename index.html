<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFP PCRR 2026 | Aula Inaugural</title>
    <!-- Google Fonts: Montserrat para autoridade e sobriedade -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --police-blue: #0a192f;
            --police-gold: #c5a059; /* Dourado extraído do brasão */
            --gold-light: #e5c158;
            --deep-black: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(197, 160, 89, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--deep-black);
            background-image: 
                radial-gradient(circle at top, var(--police-blue) 0%, transparent 70%),
                linear-gradient(180deg, var(--deep-black) 0%, #000 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Brasão com brilho sutil */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeIn 1.2s ease-out;
        }

        .brasao {
            width: 180px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.25));
        }

        /* Frase Principal Dinâmica */
        .main-headline {
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 1px;
            max-width: 800px;
            line-height: 1.2;
            margin-bottom: 3rem;
        }

        .highlight-days {
            display: block;
            font-size: 3.5rem;
            background: linear-gradient(to bottom, #fff 20%, var(--police-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        /* Grid de Contagem */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            width: 100%;
            max-width: 850px;
            margin-bottom: 4rem;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            padding: 2rem 1rem;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--police-gold);
        }

        .card .value {
            display: block;
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--police-gold);
            line-height: 1;
        }

        .card .label {
            display: block;
            margin-top: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            font-weight: 700;
        }

        /* Barra de Progresso Estilizada */
        .progress-box {
            width: 100%;
            max-width: 650px;
            background: rgba(0,0,0,0.3);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--police-gold);
            text-transform: uppercase;
        }

        #percent-text {
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
        }

        .progress-track {
            height: 10px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1A365D 0%, var(--police-gold) 100%);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
            transition: width 1s linear;
        }

        /* Footer Motivacional */
        .footer-text {
            margin-top: 3rem;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            font-weight: 400;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Celular */
        @media (max-width: 600px) {
            .countdown-container { grid-template-columns: repeat(2, 1fr); }
            .highlight-days { font-size: 2.5rem; }
            .main-headline { font-size: 1.1rem; }
            .card .value { font-size: 2.2rem; }
            .brasao { width: 130px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <!-- O arquivo brasao.png deve estar no seu repositório -->
        <img src="brasao.png" alt="Brasão PCRR" class="brasao" onerror="this.src='https://i.imgur.com/vHCH4rU.png'">
        
        <div class="main-headline">
            <span class="highlight-days" id="top-days">FALTAM -- DIAS</span>
            Para a aula inaugural do CFP da PCRR
        </div>
    </div>

    <div class="countdown-container">
        <div class="card">
            <span class="value" id="days">00</span>
            <span class="label">Dias</span>
        </div>
        <div class="card">
            <span class="value" id="hours">00</span>
            <span class="label">Horas</span>
        </div>
        <div class="card">
            <span class="value" id="minutes">00</span>
            <span class="label">Minutos</span>
        </div>
        <div class="card">
            <span class="value" id="seconds">00</span>
            <span class="label">Segundos</span>
        </div>
    </div>

    <div class="progress-box">
        <div class="progress-header">
            <span class="progress-label">Progresso da Jornada</span>
            <span id="percent-text">0.00%</span>
        </div>
        <div class="progress-track">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div class="footer-text">Valor e Lealdade • PCRR 2026</div>

    <script>
        // Data Alvo: 04 de Setembro de 2026
        const targetDate = new Date('2026-09-04T00:00:00').getTime();
        
        // Data de Início para a barra de progresso (ex: Data da Publicação do Edital ou início de 2024)
        const startDate = new Date('2024-01-01T00:00:00').getTime();

        function update() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.querySelector('.header').innerHTML = "<h1>O DIA CHEGOU! 🎉</h1>";
                return;
            }

            // Cálculos
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            // Atualiza Topo
            document.getElementById('top-days').innerText = `FALTAM ${d} DIAS`;

            // Atualiza Cards
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            // Progresso
            const total = targetDate - startDate;
            const current = now - startDate;
            let percent = (current / total) * 100;
            percent = Math.min(Math.max(percent, 0), 100);

            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('percent-text').innerText = percent.toFixed(2) + '%';
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
