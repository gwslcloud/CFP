<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contagem Regressiva</title>
  <style>
    /* Reset básico e variáveis de estilo */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(22, 30, 49, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-color: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Detalhe de fundo decorativo */
    body::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--accent-glow);
      filter: blur(120px);
      border-radius: 50%;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    /* Container Principal */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    /* Blocos da Contagem Regressiva */
    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .time-block {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(8px);
      padding: 1.25rem 0.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }

    .time-number {
      display: block;
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .time-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Barra de Progresso */
    .progress-container {
      width: 100%;
      margin-top: 1rem;
    }

    .progress-bar-wrapper {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      height: 16px;
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, var(--accent-color));
      border-radius: 9999px;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
      transition: width 1s linear;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .progress-percent {
      font-weight: 700;
      color: var(--text-main);
    }

    /* Mensagem Comemorativa */
    #celebration-message {
      font-size: 1.8rem;
      font-weight: 700;
      color: #34d399; /* Emerald */
      background: var(--card-bg);
      border: 1px solid rgba(52, 211, 153, 0.2);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(52, 211, 153, 0.1);
      margin-bottom: 2rem;
    }

    .hidden {
      display: none !important;
    }

    /* Responsividade */
    @media (max-width: 480px) {
      h1 {
        font-size: 1.8rem;
      }
      
      .countdown-grid {
        gap: 0.5rem;
      }

      .time-number {
        font-size: 1.8rem;
      }

      .time-label {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Tempo Restante</h1>
    <p class="subtitle">Contagem regressiva até 04 de Setembro de 2026</p>

    <!-- Painel de Contagem -->
    <div id="countdown" class="countdown-grid">
      <div class="time-block">
        <span id="days" class="time-number">00</span>
        <span class="time-label">Dias</span>
      </div>
      <div class="time-block">
        <span id="hours" class="time-number">00</span>
        <span class="time-label">Horas</span>
      </div>
      <div class="time-block">
        <span id="minutes" class="time-number">00</span>
        <span class="time-label">Mins</span>
      </div>
      <div class="time-block">
        <span id="seconds" class="time-number">00</span>
        <span class="time-label">Segs</span>
      </div>
    </div>

    <!-- Mensagem de Sucesso (Oculta por padrão) -->
    <div id="celebration-message" class="hidden">
      O dia chegou! 🎉
    </div>

    <!-- Seção de Progresso -->
    <div class="progress-container">
      <div class="progress-bar-wrapper">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="progress-info">
        <span>Progresso decorrido</span>
        <span id="progress-percent" class="progress-percent">0.0%</span>
      </div>
    </div>
  </div>

  <script>
    // Configurações de Data
    // Data de início: 21 de Julho de 2026
    const startDate = new Date("2026-07-21T00:00:00").getTime();
    // Data alvo: 04 de Setembro de 2026 às 00:00
    const targetDate = new Date("2026-09-04T00:00:00").getTime();
    
    const totalDuration = targetDate - startDate;

    function updateCountdown() {
      const now = new Date().getTime();
      const timeRemaining = targetDate - now;

      // Se o tempo acabar
      if (timeRemaining <= 0) {
        document.getElementById('countdown').classList.add('hidden');
        document.getElementById('celebration-message').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('progress-percent').innerText = '100.0%';
        clearInterval(timerInterval);
        return;
      }

      // Cálculos de tempo
      const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
      const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

      // Atualização do DOM da contagem
      document.getElementById('days').innerText = String(days).padStart(2, '0');
      document.getElementById('hours').innerText = String(hours).padStart(2, '0');
      document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
      document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');

      // Cálculo de progresso
      const elapsed = now - startDate;
      let percent = (elapsed / totalDuration) * 100;
      
      // Garante que o progresso fique entre 0% e 100%
      percent = Math.max(0, Math.min(100, percent));

      // Atualização do DOM do progresso
      document.getElementById('progress-bar').style.width = percent.toFixed(1) + '%';
      document.getElementById('progress-percent').innerText = percent.toFixed(1) + '%';
    }

    // Atualiza a cada segundo
    const timerInterval = setInterval(updateCountdown, 1000);
    
    // Executa a primeira vez de forma imediata
    updateCountdown();
  </script>
</body>
</html>
