<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFP PCRR 2026 | Aula Inaugural</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --police-blue: #0a192f;
            --gold: #d4af37;
            --gold-shine: #f3dfa2;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at top, var(--police-blue) 0%, transparent 60%),
                radial-gradient(circle at bottom, #000 0%, transparent 50%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container Principal */
        .main-container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        /* Ajuste do Brasão - Removendo fundo branco via CSS */
        .brasao-wrapper {
            margin-bottom: 20px;
        }

        .brasao {
            width: 160px;
            height: auto;
            /* Esta linha abaixo tenta remover o fundo branco da imagem */
            mix-blend-mode: lighten; 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        /* Tipografia de Impacto */
        .headline {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .countdown-main {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .time-block {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 20px;
            min-width: 120px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .time-block:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .time-value {
            display: block;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .time-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-top: 10px;
            font-weight: 700;
        }

        .sub-headline {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            font-size: 1.4rem;
            max-width: 700px;
            margin: 0 auto 40px;
            color: #fff;
        }

        /* Barra de Progresso */
        .progress-section {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
        }

        .progress-track {
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1a365d, var(--gold));
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: width 1s ease-in-out;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsivo */
        @media (max-width: 650px) {
            .countdown-main { display: grid; grid-template-columns: 1fr 1fr; }
            .time-value { font-size: 2.5rem; }
            .sub-headline { font-size: 1rem; }
            .brasao { width: 120px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="brasao-wrapper">
            <!-- Caso a imagem brasao.png tenha fundo branco, o CSS mix-blend-mode tentará suavizar -->
            <img src="brasao.png" alt="Brasão PCRR" class="brasao" onerror="this.src='https://i.imgur.com/vHCH4rU.png'">
        </div>

        <h2 class="headline">Faltam</h2>

        <div class="countdown-main">
            <div class="time-block">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Dias</span>
            </div>
            <div class="time-block">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Horas</span>
            </div>
            <div class="time-block">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Minutos</span>
            </div>
            <div class="time-block">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Segundos</span>
            </div>
        </div>

        <h1 class="sub-headline">Para o início da Aula Inaugural do CFP da PCRR</h1>

        <div class="progress-section">
            <div class="progress-info">
                <span>Progresso da Jornada</span>
                <span id="percent-text">0.00%</span>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div class="footer">Polícia Civil de Roraima • 2026</div>
    </div>

    <script>
        const targetDate = new Date('2026-09-04T00:00:00').getTime();
        const startDate = new Date('2024-01-01T00:00:00').getTime(); // Início da contagem histórica

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.querySelector('.main-container').innerHTML = "<h1>A Aula Inaugural Começou! 👮‍♂️</h1>";
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            // Cálculo do progresso
            const total = targetDate - startDate;
            const current = now - startDate;
            let percent = (current / total) * 100;
            percent = Math.min(Math.max(percent, 0), 100);

            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('percent-text').innerText = percent.toFixed(2) + '%';
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
