<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFP PCRR 2026</title>
    <!-- Fontes de Alta Classe -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-dark: #996515;
            --bg-deep: #020617;
            --police-blue: #0f172a;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(212, 175, 55, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-deep);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            /* Efeito de vinheta cinematográfica */
            background-image: 
                radial-gradient(circle at center, rgba(15, 23, 42, 0.8) 0%, var(--bg-deep) 100%);
        }

        /* Partículas de fundo (Simuladas com Gradiente) */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 1000px;
            animation: fadeIn 2s ease-in-out;
        }

        /* Brasão com Iluminação Dinâmica */
        .brasao-container {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .brasao {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.2));
            transition: transform 0.5s ease;
        }

        .brasao:hover {
            transform: scale(1.05);
        }

        /* Frase Principal Estilizada */
        .main-phrase {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 4rem;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cronômetro Moderno */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            margin-bottom: 5rem;
        }

        .unit {
            position: relative;
        }

        .number {
            display: block;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 0.5rem;
            color: #fff;
            opacity: 0.95;
        }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--gold);
            font-weight: 700;
            opacity: 0.8;
        }

        /* Barra de Progresso Ultra-Fina e Elegante */
        .progress-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.4);
        }

        .track {
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            background-size: 200% 100%;
            box-shadow: 0 0 15px var(--gold);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Brilho que percorre a barra */
        .bar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsividade para Mobile */
        @media (max-width: 768px) {
            .countdown-grid { gap: 1rem; }
            .number { font-size: 2.8rem; }
            .main-phrase { font-size: 1rem; letter-spacing: 4px; }
            .brasao { width: 150px; }
            .countdown-grid { grid-template-columns: repeat(2, 1fr); gap: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brasao-container">
            <!-- Seu novo brasão transparente -->
            <img src="brasao.png" alt="PCRR" class="brasao">
        </div>

        <h1 class="main-phrase">Para o início da Aula Inaugural</h1>

        <div class="countdown-grid">
            <div class="unit">
                <span class="number" id="days">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="unit">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="unit">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="unit">
                <span class="number" id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-meta">
                <span>Jornada CFP</span>
                <span id="pct">0.00%</span>
            </div>
            <div class="track">
                <div class="bar" id="bar"></div>
            </div>
        </div>
    </div>

    <script>
        const target = new Date('2026-09-04T00:00:00').getTime();
        const start = new Date('2024-01-01T00:00:00').getTime(); // Data de início para o cálculo da barra

        function update() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.body.innerHTML = "<h1 style='font-family:Cinzel; color:#D4AF37;'>A Aula Inaugural Começou.</h1>";
                return;
            }

            // Cálculos do Tempo
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            // Progresso
            const total = target - start;
            const current = now - start;
            let percent = (current / total) * 100;
            percent = Math.min(Math.max(percent, 0), 100);

            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('pct').innerText = percent.toFixed(2) + '%';
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
