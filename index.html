<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFP PCRR 2026</title>
    
    <!-- Configurações de PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="brasao.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-gradient: linear-gradient(180deg, #F3DFA2 0%, #D4AF37 100%);
            --navy-deep: #05070a;
            --navy-light: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(212, 175, 55, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--navy-deep);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, var(--navy-light) 0%, var(--navy-deep) 80%);
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 2rem 1.5rem;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .brasao-wrapper { margin-bottom: 1.5rem; }
        .brasao {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2));
        }

        .faltam-label {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.5rem;
            font-weight: 400;
            display: block;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-gold);
            border-radius: 16px;
            padding: 1.5rem 0.5rem;
        }

        .number {
            display: block;
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }

        .unit {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
        }

        .target-phrase {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .progress-container { width: 100%; padding: 0 10px; margin-bottom: 2rem;}
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--gold);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .track {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1A365D, var(--gold));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transition: width 1s ease-in-out;
        }

        /* Botão de Instalação Profissional */
        #install-btn {
            display: none;
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin: 0 auto 2rem;
            transition: all 0.3s;
        }

        #install-btn:active {
            background: var(--gold);
            color: var(--navy-deep);
        }

        .footer-brand {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 768px) {
            .app-container { max-width: 800px; }
            .countdown-grid { grid-template-columns: repeat(4, 1fr); }
            .number { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="brasao-wrapper">
            <img src="brasao.png" alt="Brasão PCRR" class="brasao" onerror="this.src='https://i.imgur.com/8Qp2D6C.png'">
        </header>

        <span class="faltam-label">Faltam</span>

        <main class="countdown-grid">
            <div class="card">
                <span class="number" id="days">00</span>
                <span class="unit">Dias</span>
            </div>
            <div class="card">
                <span class="number" id="hours">00</span>
                <span class="unit">Horas</span>
            </div>
            <div class="card">
                <span class="number" id="minutes">00</span>
                <span class="unit">Minutos</span>
            </div>
            <div class="card">
                <span class="number" id="seconds">00</span>
                <span class="unit">Segundos</span>
            </div>
        </main>

        <h2 class="target-phrase">Para o início da Aula Inaugural</h2>

        <div class="progress-container">
            <div class="progress-label">
                <span>Progresso até o Curso</span>
                <span id="pct">0.00%</span>
            </div>
            <div class="track">
                <div class="bar" id="bar"></div>
            </div>
        </div>

        <button id="install-btn">Instalar Aplicativo</button>

        <div class="footer-brand">Comissão Oficial do Cadastro Reserva Da PCRR</div>
    </div>

    <script>
        const target = new Date('2026-09-04T00:00:00').getTime();
        const start = new Date('2024-01-01T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.title = "O CFP COMEÇOU!";
                document.body.innerHTML = `<div class='app-container'><h1 style='color:var(--gold); font-family:Cinzel;'>O CFP PCRR COMEÇOU!</h1></div>`;
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.title = `Faltam ${d} dias | PCRR`;
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            const total = target - start;
            const current = now - start;
            let percent = (current / total) * 100;
            percent = Math.min(Math.max(percent, 0), 100);

            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('pct').innerText = percent.toFixed(2) + '%';
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // LÓGICA PWA: Registro do Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // LÓGICA PWA: Botão de Instalação
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
