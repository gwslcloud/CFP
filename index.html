<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFP PCRR 2026</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="brasao.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #F3DFA2;
            --gold-muted: rgba(212, 175, 55, 0.4);
            --red-alert: #cc0000;
            --navy-black: #05070a;
            --tactical-blue: #0a1120;
            --text-gray: #cbd5e1;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--navy-black);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            text-align: center;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--navy-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
            padding: 20px;
        }

        .splash-brasao {
            width: 180px;
            max-width: 60%;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.3));
            animation: pulse-gold 2s infinite ease-in-out;
        }

        .splash-text {
            font-family: 'Cinzel', serif;
            margin-top: 2rem;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 1.1rem;
            width: 100%;
            opacity: 0;
            animation: fadeInText 0.8s forwards 0.2s;
        }

        @keyframes pulse-gold {
            0% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 50px rgba(212, 175, 55, 0.5)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2)); }
        }
        @keyframes fadeInText { to { opacity: 1; } }

        /* --- FUNDO TÁTICO --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 35%, var(--tactical-blue) 0%, var(--navy-black) 70%);
            z-index: 0;
        }

        /* --- CONTEÚDO --- */
        .app-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .app-container.started { opacity: 1; }

        .brasao-wrapper, .faltam-label, .card, .target-phrase, .progress-container, footer, .btn-group {
            opacity: 0;
            transform: translateY(15px);
        }

        .app-container.started .brasao-wrapper,
        .app-container.started .faltam-label,
        .app-container.started .card,
        .app-container.started .target-phrase,
        .app-container.started .progress-container,
        .app-container.started footer,
        .app-container.started .btn-group {
            animation: revealItem 0.5s ease forwards;
        }

        @keyframes revealItem { to { opacity: 1; transform: translateY(0); } }

        /* DELAYS */
        .app-container.started .brasao-wrapper { animation-delay: 0.1s; }
        .app-container.started .faltam-label { animation-delay: 0.2s; }
        .app-container.started .card:nth-child(1) { animation-delay: 0.3s; }
        .app-container.started .card:nth-child(2) { animation-delay: 0.4s; }
        .app-container.started .card:nth-child(3) { animation-delay: 0.5s; }
        .app-container.started .card:nth-child(4) { animation-delay: 0.6s; }
        .app-container.started .target-phrase { animation-delay: 0.8s; }
        .app-container.started .progress-container { animation-delay: 1.0s; }
        .app-container.started .btn-group { animation-delay: 1.2s; }

        .brasao { width: 160px; height: auto; animation: breathe-glow 4s infinite ease-in-out; }
        @keyframes breathe-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2)); }
            50% { filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.6)); }
        }

        .faltam-label { font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 8px; color: var(--gold); margin-bottom: 1.5rem; font-weight: 700; }
        .countdown-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2.5rem; width: 100%; }
        .card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--gold-muted); border-radius: 12px; padding: 1.5rem 0.5rem; }
        .number { display: block; font-size: 2.8rem; font-weight: 900; color: #fff; margin-bottom: 8px; }
        .unit { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-weight: 700; }
        .target-phrase { font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 3px; color: var(--text-gray); margin-bottom: 3rem; text-transform: uppercase; }

        /* PROGRESSO */
        .progress-container { width: 100%; margin-bottom: 2.5rem; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; color: var(--gold); letter-spacing: 1px; }
        .track { height: 8px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; position: relative; border: 1px solid rgba(255, 255, 255, 0.1); }
        .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #1e293b, var(--gold)); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); transition: width 1.5s ease; border-radius: 10px; position: relative; overflow: hidden; }
        .bar::after { content: ""; position: absolute; top: 0; left: -150%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); animation: progress-shimmer 3s infinite linear; }
        @keyframes progress-shimmer { 0% { left: -150%; } 50%, 100% { left: 100%; } }

        .progress-marker { position: absolute; right: -2px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: var(--red-alert); border: 2px solid #fff; border-radius: 50%; cursor: pointer; z-index: 5; box-shadow: 0 0 12px var(--red-alert); }
        .date-tooltip { position: absolute; bottom: 28px; right: -10px; background: linear-gradient(135deg, var(--gold-bright), var(--gold)); color: var(--navy-black); padding: 5px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: 900; opacity: 0; visibility: hidden; transition: 0.3s; pointer-events: none; }
        .date-tooltip.show { opacity: 1; visibility: visible; transform: translateY(0); }

        /* BOTÕES */
        .btn-group { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 300px; margin-bottom: 2.5rem; }
        .action-btn { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 12px 20px; border-radius: 4px; font-family: 'Montserrat', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; }
        #install-btn { display: none; }

        .footer-brand { font-size: 0.5rem; letter-spacing: 4px; color: var(--text-gray); opacity: 0.15; text-transform: uppercase; margin-top: 1.5rem; pointer-events: none; }

        @media (min-width: 768px) {
            .app-container { max-width: 850px; }
            .countdown-grid { grid-template-columns: repeat(4, 1fr); }
            .number { font-size: 4.5rem; }
            .brasao { width: 220px; }
            .btn-group { flex-direction: row; max-width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="brasao.png" alt="PCRR" class="splash-brasao" id="brasao-img" onerror="this.src='https://i.imgur.com/8Qp2D6C.png'">
        <h2 class="splash-text">A Turma do Impossível</h2>
    </div>

    <div class="app-container" id="main-content">
        <header class="brasao-wrapper">
            <img src="brasao.png" alt="Brasão PCRR" class="brasao" onerror="this.src='https://i.imgur.com/8Qp2D6C.png'">
        </header>

        <span class="faltam-label">Faltam</span>

        <main class="countdown-grid">
            <div class="card"><span class="number" id="days">00</span><span class="unit">Dias</span></div>
            <div class="card"><span class="number" id="hours">00</span><span class="unit">Horas</span></div>
            <div class="card"><span class="number" id="minutes">00</span><span class="unit">Minutos</span></div>
            <div class="card"><span class="number" id="seconds">00</span><span class="unit">Segundos</span></div>
        </main>

        <h2 class="target-phrase">Para o início da aula inaugural</h2>

        <div class="progress-container">
            <div class="progress-label"><span>Progresso</span><span id="pct">0.00%</span></div>
            <div class="track">
                <div class="bar" id="bar"></div>
                <div class="progress-marker" id="marker"></div>
                <div class="date-tooltip" id="tooltip">04/09/26</div>
            </div>
        </div>

        <div class="btn-group">
            <button id="install-btn" class="action-btn">Adicionar à tela inicial</button>
            <button id="share-btn" class="action-btn">Compartilhar no status</button>
        </div>

        <footer class="footer-brand">Comissão Oficial do Cadastro Reserva da PCRR</footer>
    </div>

    <canvas id="share-canvas" style="display:none;" width="1080" height="1920"></canvas>

    <script>
        const target = new Date('2026-09-04T00:00:00').getTime();
        const start = new Date('2024-01-01T00:00:00').getTime();
        let currentDays = 0;

        const marker = document.getElementById('marker');
        const tooltip = document.getElementById('tooltip');
        marker.addEventListener('click', (e) => {
            e.stopPropagation();
            tooltip.classList.toggle('show');
            if(tooltip.classList.contains('show')) setTimeout(() => tooltip.classList.remove('show'), 3500);
        });
        document.addEventListener('click', () => tooltip.classList.remove('show'));

        function startApp() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; main.classList.add('started'); }, 600);
        }
        document.addEventListener('DOMContentLoaded', () => setTimeout(startApp, 1800));

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff <= 0) return;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            currentDays = d;
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff % (86400000)) / 3600000).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            const pct = Math.min(Math.max(((now - start) / (target - start)) * 100, 0), 100);
            document.getElementById('bar').style.width = pct + '%';
            document.getElementById('pct').innerText = pct.toFixed(2) + '%';
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // LÓGICA DE COMPARTILHAMENTO
        const shareBtn = document.getElementById('share-btn');
        const canvas = document.getElementById('share-canvas');
        const ctx = canvas.getContext('2d');

        shareBtn.addEventListener('click', async () => {
            shareBtn.innerText = "Gerando card...";
            shareBtn.disabled = true;

            try {
                // Background
                ctx.fillStyle = "#05070a";
                ctx.fillRect(0, 0, 1080, 1920);
                const grad = ctx.createRadialGradient(540, 960, 0, 540, 960, 1000);
                grad.addColorStop(0, "#0a1120");
                grad.addColorStop(1, "#05070a");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 1080, 1920);

                const img = new Image();
                img.crossOrigin = "anonymous"; 
                img.src = document.getElementById('brasao-img').src;
                await new Promise(res => img.onload = res);
                
                // Cálculo de proporção para não distorcer
                const logoW = 480;
                const logoH = (img.height / img.width) * logoW;
                ctx.drawImage(img, (1080 - logoW)/2, 350, logoW, logoH);

                ctx.textAlign = "center";
                ctx.fillStyle = "#D4AF37"; ctx.font = "bold 55px Montserrat"; ctx.fillText("FALTAM", 540, 950);
                ctx.fillStyle = "#ffffff"; ctx.font = "900 320px Montserrat"; ctx.fillText(currentDays, 540, 1250);
                ctx.fillStyle = "#D4AF37"; ctx.font = "bold 70px Montserrat"; ctx.fillText("DIAS", 540, 1370);
                ctx.fillStyle = "#cbd5e1"; ctx.font = "45px Cinzel"; ctx.fillText("PARA O INÍCIO DA AULA INAUGURAL", 540, 1550);
                ctx.globalAlpha = 0.2; ctx.font = "28px Montserrat"; ctx.fillText("COMISSÃO OFICIAL DO CADASTRO RESERVA PCRR", 540, 1850);

                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'cfp-status.png', { type: 'image/png' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: 'CFP PCRR 2026',
                            text: `Faltam apenas ${currentDays} dias para a nossa aula inaugural!`
                        });
                    } else { alert("Navegador sem suporte a compartilhamento de imagem."); }
                    shareBtn.innerText = "Compartilhar no status"; shareBtn.disabled = false;
                });
            } catch (err) { alert("Erro ao gerar card."); shareBtn.innerText = "Compartilhar no status"; shareBtn.disabled = false; }
        });

        // PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('install-btn').style.display = 'block'; });
        document.getElementById('install-btn').addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } });
    </script>
</body>
</html>
