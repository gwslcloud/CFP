<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFP PCRR 2026</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="brasao.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #F3DFA2;
            --gold-muted: rgba(212, 175, 55, 0.4);
            --red-alert: #cc0000;
            --navy-black: #05070a;
            --tactical-blue: #0a1120;
            --text-gray: #cbd5e1;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--navy-black);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            text-align: center;
            perspective: 1000px; /* Necessário para o 3D */
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--navy-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
            padding: 20px;
        }

        .splash-brasao {
            width: 180px;
            max-width: 60%;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.3));
            animation: pulse-gold 2s infinite ease-in-out;
        }

        .splash-text {
            font-family: 'Cinzel', serif;
            margin-top: 2rem;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 1.1rem;
            width: 100%;
            opacity: 0;
            animation: fadeInText 2s forwards 0.5s;
        }

        @keyframes pulse-gold {
            0% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 50px rgba(212, 175, 55, 0.5)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2)); }
        }

        @keyframes fadeInText { to { opacity: 1; } }

        /* --- FUNDO TÁTICO --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 35%, var(--tactical-blue) 0%, var(--navy-black) 70%);
            z-index: 0;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .app-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        /* --- BRASÃO HOLOGRÁFICO 3D --- */
        .brasao-wrapper { 
            margin-bottom: 2rem; 
            position: relative;
            padding: 20px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .brasao-container {
            position: relative;
            display: inline-block;
            overflow: hidden; /* Corta o brilho glint */
            border-radius: 50%; /* Ajuste conforme o formato do brasão */
        }

        .brasao {
            width: 160px;
            height: auto;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
            display: block;
            position: relative;
            z-index: 1;
            pointer-events: none;
        }

        /* EFEITO GLINT (BRILHO PASSANTE) */
        .brasao-container::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -150%;
            width: 50%;
            height: 200%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.1) 20%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0.1) 80%,
                transparent
            );
            transform: rotate(25deg);
            z-index: 2;
            animation: glint 4s infinite ease-in-out;
        }

        @keyframes glint {
            0% { left: -150%; opacity: 0; }
            10% { opacity: 1; }
            30% { left: 150%; opacity: 0; }
            100% { left: 150%; opacity: 0; }
        }

        /* --- RESTO DOS ELEMENTOS --- */
        .faltam-label {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
            font-weight: 700;
            width: 100%;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--gold-muted);
            border-radius: 12px;
            padding: 1.5rem 0.5rem;
        }

        .number {
            display: block;
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1;
            color: #fff;
            margin-bottom: 8px;
        }

        .unit {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            font-weight: 700;
        }

        .target-phrase {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            line-height: 1.6;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-gray);
            margin-bottom: 3rem;
            width: 100%;
        }

        /* --- PROGRESS BAR --- */
        .progress-container { width: 100%; margin-bottom: 2.5rem; position: relative; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .track {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: visible; 
        }
        .bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #1e293b, var(--gold));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            position: relative; z-index: 1;
        }

        .progress-marker {
            position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
            width: 12px; height: 12px;
            background: var(--red-alert); border: 2px solid #fff;
            border-radius: 50%; cursor: pointer; z-index: 5;
            box-shadow: 0 0 12px var(--red-alert); transition: all 0.3s ease;
        }

        .date-tooltip {
            position: absolute; bottom: 28px; right: -10px; 
            background: linear-gradient(135deg, var(--gold-bright), var(--gold));
            color: var(--navy-black); padding: 5px 12px;
            border-radius: 4px; font-size: 0.85rem; font-weight: 900;
            white-space: nowrap; opacity: 0; visibility: hidden;
            transform: translateY(10px); transition: all 0.3s ease;
            pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .date-tooltip::after {
            content: ""; position: absolute; top: 100%; right: 10px;
            border-width: 6px; border-style: solid;
            border-color: var(--gold) transparent transparent transparent;
        }
        .date-tooltip.show { opacity: 1; visibility: visible; transform: translateY(0); }

        #install-btn {
            display: none; background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold); color: var(--gold);
            padding: 10px 24px; border-radius: 4px;
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-bottom: 2.5rem;
        }

        .footer-brand {
            font-size: 0.65rem; letter-spacing: 2px;
            color: var(--text-gray); opacity: 0.6;
            text-transform: uppercase; width: 100%;
        }

        @media (min-width: 768px) {
            .app-container { max-width: 850px; }
            .countdown-grid { grid-template-columns: repeat(4, 1fr); }
            .number { font-size: 4.5rem; }
            .brasao { width: 220px; }
            .faltam-label { font-size: 1.4rem; letter-spacing: 12px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="brasao.png" alt="PCRR" class="splash-brasao" onerror="this.src='https://i.imgur.com/8Qp2D6C.png'">
        <h2 class="splash-text">A Turma do Impossível</h2>
    </div>

    <div class="app-container" id="main-content">
        <header class="brasao-wrapper" id="brasao-3d">
            <div class="brasao-container">
                <img src="brasao.png" alt="Brasão PCRR" class="brasao" id="brasao-img" onerror="this.src='https://i.imgur.com/8Qp2D6C.png'">
            </div>
        </header>

        <span class="faltam-label">Faltam</span>

        <main class="countdown-grid">
            <div class="card">
                <span class="number" id="days">00</span>
                <span class="unit">Dias</span>
            </div>
            <div class="card">
                <span class="number" id="hours">00</span>
                <span class="unit">Horas</span>
            </div>
            <div class="card">
                <span class="number" id="minutes">00</span>
                <span class="unit">Minutos</span>
            </div>
            <div class="card">
                <span class="number" id="seconds">00</span>
                <span class="unit">Segundos</span>
            </div>
        </main>

        <h2 class="target-phrase">Para o início da aula inaugural</h2>

        <div class="progress-container">
            <div class="progress-label">
                <span>Progresso</span>
                <span id="pct">0.00%</span>
            </div>
            <div class="track">
                <div class="bar" id="bar"></div>
                <div class="progress-marker" id="marker"></div>
                <div class="date-tooltip" id="tooltip">04/09/26</div>
            </div>
        </div>

        <button id="install-btn">Adicionar à Tela Inicial</button>

        <footer class="footer-brand">
            Comissão Oficial do Cadastro Reserva da PCRR
        </footer>
    </div>

    <script>
        const target = new Date('2026-09-04T00:00:00').getTime();
        const start = new Date('2024-01-01T00:00:00').getTime();

        // --- LÓGICA DO BRASÃO 3D ---
        const wrapper = document.getElementById('brasao-3d');
        const img = document.getElementById('brasao-img');

        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 15;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 15;
            
            wrapper.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
            
            // Sombra dinâmica baseada na inclinação
            img.style.filter = `drop-shadow(${xAxis}px ${yAxis}px 25px rgba(0,0,0,0.6))`;
        });

        // Resetar posição quando o mouse sai
        document.addEventListener('mouseleave', () => {
            wrapper.style.transform = `rotateY(0deg) rotateX(0deg)`;
            img.style.filter = `drop-shadow(0 15px 25px rgba(0,0,0,0.6))`;
        });

        // --- MARCADO E TOOLTIP ---
        const marker = document.getElementById('marker');
        const tooltip = document.getElementById('tooltip');

        marker.addEventListener('click', (e) => {
            e.stopPropagation();
            tooltip.classList.toggle('show');
            if(tooltip.classList.contains('show')) {
                setTimeout(() => tooltip.classList.remove('show'), 3500);
            }
        });

        document.addEventListener('click', () => {
            tooltip.classList.remove('show');
        });

        // --- SPLASH E COUNTDOWN ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-content');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.visibility = 'hidden';
                    main.style.opacity = '1';
                }, 1000);
            }, 3500);
        });

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff <= 0) {
                document.getElementById('main-content').innerHTML = `<h1 style='color:var(--gold); font-family:Cinzel;'>MISSÃO INICIADA</h1>`;
                return;
            }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            const total = target - start;
            const current = now - start;
            let percent = (current / total) * 100;
            percent = Math.min(Math.max(percent, 0), 100);
            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('pct').innerText = percent.toFixed(2) + '%';
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // PWA Install
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
